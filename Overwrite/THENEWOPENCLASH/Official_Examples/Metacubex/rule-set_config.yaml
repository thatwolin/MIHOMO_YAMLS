# OpenClash 覆写模块 - rule-set_config.yaml
# 生成日期：2026-04-08
# 源文件：https://raw.githubusercontent.com/ChiaoYenta/THE_HNERYCHIAO_MIHOMO_YAMLS/main/THEYAMLS/Official_Examples/Metacubex/rule-set_config.yaml
# 格式：新版 OpenClash [YAML] 块覆写
#
# 本文件仅包含 [YAML] 块覆写内容，不含任何 [General] 插件设置。
# proxy-providers 内容已原样复制并注释，其余示例均为参考，默认不启用。

# ============================================================
# [YAML] 是新版 OpenClash 覆写模块的识别标记，此行不可注释。
# 所有覆写内容均写在此标记之后。
# 注释状态的内容不会生效；取消注释后保存并重新加载模块即可生效。
# ============================================================
[YAML]

# ============================================================
# 【操作符速查】
# ------------------------------------------------------------
#  key       默认合并：Hash 递归合并，其他类型直接覆盖
#  key!      强制覆盖：整个值全部替换，不做任何合并
#  key+      数组后置追加：在数组末尾加入新元素
#  +key      数组前置插入：在数组开头插入新元素（规则越靠前越优先）
#  key-      数组差集删除：移除数组中的指定元素；非数组则删除该键
#  key*      批量条件更新：配合 where/set，按条件匹配后批量修改
#  <key>后缀  同上，用于键名含特殊字符（. - /）的情况
#  +<key>    前置插入的 <> 写法
# ============================================================

# ============================================================
# 【示例一】在规则列表末尾追加规则（不影响原有规则顺序）
# ------------------------------------------------------------
# +rule-providers:
#   Steam:
#     type: http
#     behavior: domain
#     format: mrs
#     url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam.mrs"
#     interval: 86400
# +rules:
#   - RULE-SET,Steam,Proxy
# ============================================================

# ============================================================
# 【示例二】在规则列表开头插入高优先级规则（最先匹配）
# ------------------------------------------------------------
# +rules:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - IP-CIDR,192.168.0.0/16,DIRECT
# ============================================================

# ============================================================
# 【示例三】强制替换整个 rules 数组
# ------------------------------------------------------------
# rules!:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - MATCH,PROXY
# ============================================================

# ============================================================
# 【示例四】修改 dns 配置（只改指定字段，其余字段保留）
# ------------------------------------------------------------
# dns:
#   enable: true
#   cache-algorithm: lru
# ============================================================

# ============================================================
# 【示例五】给所有 url-test 类型策略组的 proxies 末尾追加节点
# ------------------------------------------------------------
# proxy-groups*:
#   where:
#     type: url-test
#   set:
#     proxies+:
#       - '节点名称'
# ============================================================

# ============================================================
# 【示例六】用正则匹配名称含 HK 的策略组，开头插入节点
# ------------------------------------------------------------
# proxy-groups*:
#   where:
#     name: '/^HK/'
#   set:
#     +proxies:
#       - '香港专线'
# ============================================================

# ============================================================
# 【proxy-providers 订阅链接替换】
# ------------------------------------------------------------
# 以下每个 proxy-providers* 块对应源文件中的一个 provider，
# 原始配置已完整复制，全部处于注释状态，不会影响任何现有配置。
#
# 使用方法：
#   1. 找到你要替换订阅链接的 provider（看 name: 字段）
#   2. 将该块的 url: 后面的地址换成你自己的订阅链接
#   3. 删除该块所有行最前面的 # 号
#   4. 保存文件，在 OpenClash 中重新加载该覆写模块即可生效
# ============================================================

# ── provider 1: provider1 ───────────────────────────────────
#
# proxy-providers*:
#   where:
#     name: 'provider1'
#   set:
#     health-check:
#       enable: true
#       interval: 300
#       url: https://www.gstatic.com/generate_204
#     interval: 86400
#     override:
#       additional-prefix: '[provider1]'
#     type: http
#     url: ''
#

# ── provider 2: provider2 ───────────────────────────────────
#
# proxy-providers*:
#   where:
#     name: 'provider2'
#   set:
#     health-check:
#       enable: true
#       interval: 300
#       url: https://www.gstatic.com/generate_204
#     interval: 86400
#     override:
#       additional-prefix: '[provider2]'
#     type: http
#     url: ''
#
